# herdr config used only for the demo recording:
# Tokyo Night theme, skip onboarding, don't restore old panes, and bind
# prefix+shift+e so the recording can boot the box via the real keybind.
# NOTE: herdr rewrites the config it's pointed at, so the record command copies
# this to a temp file and points HERDR_CONFIG_PATH there (see DEMO.md).
onboarding = false

[theme]
name = "tokyo-night"

[experimental]
pane_history = false

[keys]
prefix = "ctrl+space"

# Recording proxy: the REAL binding is prefix+shift+e, but VHS can't emit a
# standalone Shift modifier, so the tape drives prefix+u (a plain char it CAN # send) and the gif is captioned "prefix+shift+e" in post. See assets/DEMO.md.
[[keys.command]]
key = "prefix+u"
type = "shell"
command = "PATH=\"$HOME/.local/bin:$HOME/.nvm/versions/node/v24.14.1/bin:$PATH\" herdr agent start e2bbox --cwd \"$HOME/Documents/GitHub/herdr-e2b/demo\" --split down --focus -- bash -lc 'e2b-box open'"
description = "e2b: open the box"
