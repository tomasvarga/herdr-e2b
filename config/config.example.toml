# herdr-e2b config
# Copy to:  ~/.config/herdr/plugins/config/herdr-e2b/config.toml
#           (or $XDG_CONFIG_HOME/herdr/plugins/config/herdr-e2b/config.toml)
# Every key is optional; the defaults shown here are used when absent.

[secrets]
# Your E2B API key. Env E2B_API_KEY (if set) always wins over this; use this to
# keep the key here — herdr-native, out of ~/.zshrc and out of the repo, and
# picked up by the running herdr server with no restart. https://e2b.dev/dashboard
# e2b_api_key = "e2b_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[sandbox]
# E2B template. "base" (default) is minimal and always available — fine to try
# the flow, but tight on disk/tools for real work.
# RECOMMENDED: build a bigger CUSTOM template (more disk + CPU, your toolchain
# baked in) and set it here — see the README and install.sh. Public agent
# templates (claude, codex, opencode, … https://e2b.dev/docs/agents) also
# work but can run out of space. (Claude Code's template is named `claude`;
# Devin has no prebuilt template — install it into a base sandbox yourself.)
template     = "base"

# Per-branch template overrides — first matching rule (JS regex on the branch)
# wins over `template`. Route a branch to the right agent by naming it, e.g.
# `e2b/cc/*` gets Claude Code, `e2b/cx/*` gets Codex, everything else opencode.
# Use the exact template name (`e2b template list`, or E2B's public names:
# claude / codex / opencode / amp / grok).
# [[sandbox.template_rules]]
# pattern  = "^e2b/cc/"          # Claude Code branches
# template = "claude"
# [[sandbox.template_rules]]
# pattern  = "^e2b/cx/"          # Codex branches
# template = "codex"
# [[sandbox.template_rules]]
# pattern  = "^e2b/"             # default agent for e2b/* branches
# template = "opencode"

# Idle window before E2B stops the sandbox (ms). Default 1h — which is also the cap
# on E2B's free tier (a longer value there just fails). On a paid plan,
# bump it for longer-lived sandboxes; 3h is a sane minimum:
#   timeout_ms = 10800000   # 3h  (needs a paid E2B plan)
timeout_ms   = 3600000

# Pause the sandbox on idle-timeout instead of killing it (SDK lifecycle
# onTimeout=pause), so its state is preserved. Works on the free tier and is the
# best way to not lose work at the 1h timeout. Default false; set true to enable.
auto_pause   = false
# Only when auto_pause: wake the sandbox (restore its memory) automatically on the
# next connect. Default true. Set false to keep a filesystem-only snapshot that
# cold-boots on reconnect (loses running processes, but cheaper to keep paused).
auto_resume  = true

# Where the worktree is uploaded inside the sandbox. Defaults to /home/user/project.
# Uncomment to point it elsewhere.
# project_path = "/home/user/project"

# Port used to construct the preview URL (`e2b-box url`) — set it to whatever
# your dev server listens on inside the sandbox.
server_port  = 3000

[dashboard]
# Default theme for the `e2b-dash` TUI. Omit (or "terminal"/"auto") to inherit
# your terminal's own palette. Cycle live with `T` (that choice is remembered and
# overrides this). Presets: terminal · solarized-light · tokyo-night · dracula ·
# nord · gruvbox.
# theme = "terminal"

[upload]
# Files uploaded per batch (peak memory scales with this, not repo size).
batch_size = 40

# File selection primarily follows git: tracked files (incl. your uncommitted
# edits) + new untracked files, honoring .gitignore. So build output, caches,
# node_modules, etc. are NOT uploaded. This `ignore` list is an extra safety
# filter applied on top — mainly to keep secrets like .env out even if a repo
# happens to track them. (For non-git folders it's the only filter.)
ignore = [".git", "node_modules", ".next", "dist", "build", ".turbo", ".cache",
          "target", ".venv", "__pycache__", ".DS_Store", ".env", ".env.local"]
