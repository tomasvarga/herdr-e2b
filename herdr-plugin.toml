id = "herdr-e2b"
name = "herdr-e2b"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Send a git worktree to a fresh E2B cloud sandbox on demand — a snapshot upload of the live tree, uncommitted changes and all. Press prefix+shift+e to boot a box for the current worktree and drop into a shell; the box is torn down when the worktree is removed."
platforms = ["macos", "linux"]

# On `plugin install`: install node deps and link the e2b-box CLI onto PATH.
# (Skipped by `plugin link`; run ./install.sh yourself when developing locally.)
[[build]]
command = ["bash", "install.sh"]

# Worktree removed -> kill the sandbox (no orphaned, billable boxes left behind).
[[events]]
on = "worktree.removed"
command = ["bash", "bin/teardown-worktree"]

# Actions register the plugin's verbs with herdr. Invoke any of them with
#   herdr plugin action invoke <id> --plugin herdr-e2b
# or bind a key (optional) in your herdr config, e.g.:
#   [[keys.command]]
#   key = "prefix+shift+e"
#   command = "herdr plugin action invoke open --plugin herdr-e2b"
# (Avoid plain prefix+e — that's herdr's built-in edit_scrollback.) Only `open`
# needs an interactive pane; the one-shot verbs below print to the plugin command
# log (herdr plugin log list --plugin herdr-e2b).

# Send the current worktree to E2B and open its shell (provisions if needed).
[[actions]]
id = "open"
title = "Open E2B box"
contexts = ["workspace"]
command = ["bash", "-lc", "e2b-box open"]

# Re-upload the current worktree into its box (local → box).
[[actions]]
id = "sync"
title = "Sync worktree → box"
contexts = ["workspace"]
command = ["bash", "-lc", "e2b-box sync"]

# Download the box's files back into this folder (box → local).
[[actions]]
id = "pull"
title = "Pull box → worktree"
contexts = ["workspace"]
command = ["bash", "-lc", "e2b-box pull"]

# Print this worktree's box record (status, sandbox id, url).
[[actions]]
id = "status"
title = "Box status"
contexts = ["workspace"]
command = ["bash", "-lc", "e2b-box status"]

# Kill this worktree's box.
[[actions]]
id = "kill"
title = "Kill E2B box"
contexts = ["workspace"]
command = ["bash", "-lc", "e2b-box kill"]

# Open the dashboard TUI — a live board of every tracked box with per-box
# open/sync/pull/kill (optional; requires the Rust build, see install.sh).
[[actions]]
id = "dashboard"
title = "E2B dashboard"
command = ["bash", "-lc", "e2b-dash"]

# Persistent pane entrypoint (herdr's pane menu): shows a spinner while the box
# boots, then execs a shell inside the sandbox. Zoomed (full-screen) — you're
# working in the cloud box, so there's nothing local to keep beside it.
[[panes]]
id = "box"
title = "e2b"
placement = "zoomed"
command = ["bash", "-lc", "e2b-box open"]

# Dashboard pane: the live board of all tracked boxes. From here open/sync/pull
# spawn their own panes and `open`'s shell hands back to the board on exit.
[[panes]]
id = "dashboard"
title = "e2b dashboard"
placement = "zoomed"
command = ["bash", "-lc", "e2b-dash"]
