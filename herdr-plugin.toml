id = "herdr-e2b"
name = "herdr-e2b"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Send a git worktree to a fresh E2B cloud sandbox on demand — a snapshot upload of the live tree, uncommitted changes and all. Press prefix+e to boot a box for the current worktree and drop into a shell; the box is torn down when the worktree is removed."
platforms = ["macos", "linux"]

# On `plugin install`: install node deps and link the e2b-box CLI onto PATH.
# (Skipped by `plugin link`; run ./install.sh yourself when developing locally.)
[[build]]
command = ["bash", "install.sh"]

# Worktree created -> auto-provision a box IF its branch opts in.
# Gated by [trigger] in config.toml:
#   mode = "marked" (default) -> only branches matching branch_prefix (default "e2b/")
#   mode = "manual"           -> never (use prefix+e / e2b-box up)
#   mode = "all"              -> every new worktree
[[events]]
on = "worktree.created"
command = ["bash", "bin/mirror-worktree"]

# Worktree removed -> kill the sandbox (no orphaned, billable boxes left behind).
[[events]]
on = "worktree.removed"
command = ["bash", "bin/teardown-worktree"]

# Send the current worktree to E2B and open its shell (provisions if needed).
# Bind a key (e.g. prefix+e) to plugin.herdr-e2b.open.
[[actions]]
id = "open"
title = "Open E2B box"
contexts = ["workspace"]
command = ["bash", "-lc", "e2b-box open"]

# Start a brand-new e2b/<name> worktree + box: prompts for a name, confirms,
# creates the worktree, then boots its box. Bind prefix+shift+e to the "new"
# pane below (needs a TTY for the prompt).
[[actions]]
id = "new"
title = "New E2B worktree"
contexts = ["workspace"]
command = ["bash", "-lc", "e2b-box new"]

# Persistent pane entrypoint (herdr's pane menu): shows a spinner while the box
# boots, then execs a shell inside the sandbox. Zoomed (full-screen) — you're
# working in the cloud box, so there's nothing local to keep beside it.
[[panes]]
id = "box"
title = "e2b"
placement = "zoomed"
command = ["bash", "-lc", "e2b-box open"]

# Prompt pane for `e2b-box new` (bind prefix+shift+e). Overlay so it's a quick
# transient prompt; it creates the worktree, then opens the box pane zoomed.
[[panes]]
id = "new"
title = "e2b new"
placement = "overlay"
command = ["bash", "-lc", "e2b-box new"]
